<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Network Intelligence</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#341100",
                        "surface-tint": "#3b5f92",
                        "inverse-primary": "#a7c8ff",
                        "primary-container": "#1a4273",
                        "inverse-on-surface": "#eef1f7",
                        "inverse-surface": "#2d3135",
                        "secondary-fixed-dim": "#ffb692",
                        "secondary-container": "#fd8039",
                        "tertiary-container": "#25445d",
                        "on-error": "#ffffff",
                        "surface-variant": "#dfe3e8",
                        "outline": "#737780",
                        "tertiary": "#0a2e46",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#ffdbcb",
                        "surface-container-high": "#e5e8ee",
                        "on-primary-container": "#8cafe7",
                        "outline-variant": "#c3c6d0",
                        "on-background": "#181c20",
                        "tertiary-fixed-dim": "#abcae8",
                        "surface-bright": "#f7f9ff",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#dfe3e8",
                        "surface-container-low": "#f1f4fa",
                        "on-tertiary-container": "#92b1ce",
                        "surface": "#f7f9ff",
                        "on-error-container": "#93000a",
                        "background": "#f7f9ff",
                        "on-secondary-container": "#642600",
                        "on-secondary-fixed-variant": "#793000",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#001c3b",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d7dae0",
                        "secondary": "#9f4200",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#ebeef4",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#43474f",
                        "primary-fixed": "#d5e3ff",
                        "tertiary-fixed": "#cce5ff",
                        "primary-fixed-dim": "#a7c8ff",
                        "on-primary-fixed-variant": "#214779",
                        "on-tertiary-fixed-variant": "#2b4963",
                        "on-surface": "#181c20",
                        "primary": "#002c57",
                        "on-tertiary-fixed": "#001d31"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .shimmer {
            background: linear-gradient(90deg, #f1f4fa 25%, #e5e8ee 50%, #f1f4fa 75%);
            background-size: 200% 100%;
        }
        .ghost-border {
            border: 1px solid rgba(195, 198, 208, 0.15);
        }
        .primary-gradient {
            background: linear-gradient(to bottom right, #002c57, #1a4273);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center p-6">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col gap-10">
<!-- Header & Logo Section -->
<header class="flex flex-col items-center text-center gap-4">
<div class="w-20 h-20 flex items-center justify-center rounded-xl overflow-hidden mb-2">
<img alt="Network Intelligence Brand Logo" class="w-full h-full object-contain" data-alt="minimalist corporate logo for a technology firm with geometric shapes in deep blue and orange accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAu3SXOxfzApdXmYMPOEzpPlXlXr95z_WU2dRlH9O7Xa-RxctR3YRWdrzA6Ok1tsdWmuKUpLaVoyyIj79AMha-J241M9BoH1nB0XaP-IxfQxCTiwz35t29uVXJOzcentehbFYgTNmMnRIwrKiho6rveMExTJvwTDiJCjeQS5endD78TrtPFo6ayk7nyY4EXqbtfdicKw799cqOfBh33VaZ3Q3nn7Y5XfdnibNSUbLrh78ikTcevfx7a5eCzcMNluoJuzZbBtVt1pv8"/>
</div>
<div class="space-y-1">
<h1 class="text-primary font-headline text-2xl font-black tracking-tighter">Network Intelligence</h1>
<p class="text-on-surface-variant font-body text-sm tracking-tight opacity-70">Admin Console Access</p>
</div>
</header>
<!-- Form Section -->
<section class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0_12px_32px_rgba(24,28,32,0.06)] ghost-border">
<form class="space-y-6">
<!-- Login Field -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant" for="login">login</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none focus:ring-0 focus:border-b-2 focus:border-primary text-body-md py-3 px-4 rounded-lg placeholder:text-outline-variant transition-all" id="login" placeholder="admin.user" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant" for="password">senha</label>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none focus:ring-0 focus:border-b-2 focus:border-primary text-body-md py-3 px-4 rounded-lg placeholder:text-outline-variant transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full primary-gradient text-white font-medium py-3.5 rounded-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                    Entrar
                </button>
<div class="flex items-center justify-center">
<a class="text-[0.8125rem] text-primary hover:underline font-medium transition-all" href="#">Esqueceu a senha?</a>
</div>
</form>
</section>
<!-- Feedback Examples (Error & Loading States) -->
<aside class="space-y-4 pt-4">
<div class="flex items-center gap-2">
<span class="h-px flex-1 bg-outline-variant/20"></span>
<span class="text-[0.625rem] font-bold uppercase tracking-widest text-outline-variant">Visual Feedback Previews</span>
<span class="h-px flex-1 bg-outline-variant/20"></span>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Error State Example -->
<div class="bg-error-container text-on-error-container p-4 rounded-lg border border-error/10 flex items-start gap-3">
<span class="material-symbols-outlined text-[1.25rem] mt-0.5">report</span>
<div class="space-y-0.5">
<p class="text-xs font-bold leading-none">Erro de Autenticação</p>
<p class="text-[0.75rem] opacity-80">Credenciais incorretas ou acesso negado.</p>
</div>
</div>
<!-- Loading State Example -->
<div class="bg-surface-container-low p-4 rounded-lg ghost-border flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-5 h-5 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
<span class="text-[0.75rem] font-medium text-primary">Processando...</span>
</div>
<div class="flex gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></div>
<div class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse [animation-delay:0.2s]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse [animation-delay:0.4s]"></div>
</div>
</div>
</div>
</aside>
<!-- Footer Footer Branding -->
<footer class="mt-auto pt-8 flex flex-col items-center gap-4">
<div class="flex gap-6">
<a class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant hover:text-primary transition-colors" href="#">Termos</a>
<a class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant hover:text-primary transition-colors" href="#">Privacidade</a>
<a class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant hover:text-primary transition-colors" href="#">Suporte</a>
</div>
<p class="text-[0.625rem] text-outline opacity-50">© 2024 Network Intelligence Operations. All rights reserved.</p>
</footer>
</main>
</body></html>
