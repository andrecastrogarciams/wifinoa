<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Network Intelligence</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#002c57",
                        "secondary": "#9f4200",
                        "surface": "#f7f9ff",
                        "on-surface": "#181c20",
                        "on-surface-variant": "#43474f",
                        "outline-variant": "#c3c6d0",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#dfe3e8",
                        "surface-container-low": "#f1f4fa",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                    }
                },
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .ghost-border { border: 1px solid rgba(195, 198, 208, 0.15); }
        .primary-gradient { background: linear-gradient(to bottom right, #002c57, #1a4273); }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center p-6">
    <main class="w-full max-w-[440px] flex flex-col gap-10">
        <header class="flex flex-col items-center text-center gap-4">
            <div class="w-20 h-20 flex items-center justify-center rounded-xl overflow-hidden mb-2">
                <div class="w-full h-full bg-primary flex items-center justify-center text-white text-3xl font-black">NI</div>
            </div>
            <div class="space-y-1">
                <h1 class="text-primary font-headline text-2xl font-black tracking-tighter">Network Intelligence</h1>
                <p class="text-on-surface-variant font-body text-sm tracking-tight opacity-70">Admin Console Access</p>
            </div>
        </header>

        <section class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0_12px_32px_rgba(24,28,32,0.06)] ghost-border">
            {% if messages %}
                {% for message in messages %}
                <div class="mb-6 bg-error-container text-on-error-container p-4 rounded-lg border border-error/10 flex items-start gap-3">
                    <span class="material-symbols-outlined text-[1.25rem] mt-0.5">report</span>
                    <div class="space-y-0.5">
                        <p class="text-xs font-bold leading-none">Erro de Autenticação</p>
                        <p class="text-[0.75rem] opacity-80">{{ message }}</p>
                    </div>
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="block text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant" for="username">login</label>
                    <div class="relative">
                        <input name="username" class="w-full bg-surface-container-highest border-none focus:ring-0 focus:border-b-2 focus:border-primary py-3 px-4 rounded-lg placeholder:text-outline-variant transition-all" id="username" placeholder="admin.user" type="text" required/>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="block text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant" for="password">senha</label>
                    <div class="relative">
                        <input name="password" class="w-full bg-surface-container-highest border-none focus:ring-0 focus:border-b-2 focus:border-primary py-3 px-4 rounded-lg placeholder:text-outline-variant transition-all" id="password" placeholder="••••••••" type="password" required/>
                    </div>
                </div>

                <button class="w-full primary-gradient text-white font-medium py-3.5 rounded-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                    Entrar
                </button>
            </form>
        </section>

        <footer class="mt-auto pt-8 flex flex-col items-center gap-4">
            <p class="text-[0.625rem] text-outline opacity-50">© 2026 Network Intelligence Operations. All rights reserved.</p>
        </footer>
    </main>
</body>
</html>
